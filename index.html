<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E4D92; --blue:#5C9ED6; --sky:#79C7FF; --pale:#E8F6FF;
    --bg:#D8EDFD; --tint:rgba(121,199,255,.45);
    --font:'Quicksand','Nunito','Segoe UI',system-ui,sans-serif;
    --mono:'IBM Plex Mono','SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:var(--font);color:var(--navy);min-height:100vh}

  /* Header */
  .band{background:var(--navy);border-bottom:3px solid #fff}
  .band-inner{max-width:1280px;margin:0 auto;padding:20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px}
  .band-left{display:flex;align-items:center;gap:16px}
  .title-pill{display:inline-block;background:#fff;color:var(--blue);border:3px solid var(--pale);
    box-shadow:0 3px 0 rgba(0,0,0,.3);border-radius:14px;padding:7px 18px;font-weight:700;font-size:20px}
  .week-line{font-size:14px;font-weight:700;color:#fff;margin-top:7px}
  .status{font:500 11px var(--mono);color:var(--pale);margin-left:10px}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .nav-btn{height:38px;min-width:38px;border-radius:12px;cursor:pointer;border:3px solid #fff;
    background:var(--blue);color:#fff;font-size:19px;font-weight:700;font-family:var(--font);
    box-shadow:0 2px 0 rgba(0,0,0,.3);line-height:1}
  .nav-btn:disabled{opacity:.4;cursor:default}
  .nav-btn.today{background:#fff;border-color:var(--pale);color:var(--blue);font-size:13.5px;padding:0 16px}
  .nav-btn.copy{font-size:13px;padding:0 14px}

  /* Grid + cards */
  .grid-wrap{max-width:1280px;margin:0 auto;padding:20px 20px 36px}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(252px,1fr))}
  .card{background:var(--pale);border-radius:18px;border:2px solid #fff;
    box-shadow:0 3px 10px rgba(14,77,146,.10);display:flex;flex-direction:column;min-height:240px;
    transition:background .15s,border-color .15s}
  .card.today{border-color:var(--blue);box-shadow:0 6px 18px rgba(14,77,146,.18)}
  .card.dragover{background:var(--sky);border-color:var(--navy)}
  .card-head{padding:13px 14px 4px;display:flex;align-items:center;justify-content:space-between}
  .head-left{display:flex;align-items:center;gap:8px}
  .date-chip{width:35px;height:35px;border-radius:12px;flex-shrink:0;background:var(--tint);color:var(--navy);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .date-chip.today{background:var(--navy);color:#fff;box-shadow:0 2px 0 #072F5F}
  .dow{font-size:13.5px;font-weight:700}
  .mo{font-size:11px;font-weight:600;color:#7AA4C8}
  .mo.today{color:var(--navy)}
  .counter{font:700 10.5px var(--mono);color:var(--navy);background:var(--tint);border-radius:999px;padding:2px 8px}
  .counter.alldone{background:var(--blue);color:#fff}
  .card-body{padding:0 14px 14px;flex:1;display:flex;flex-direction:column}
  .chip{display:inline-block;background:var(--tint);color:var(--navy);font-weight:700;font-size:10px;
    letter-spacing:.09em;text-transform:uppercase;border-radius:999px;padding:3px 10px;margin:6px 0 4px}
  .empty{font-size:12.5px;font-weight:500;color:#7FB3DE;padding:3px 0}
  .divider{margin-top:10px;padding-top:8px;border-top:2px dashed var(--sky)}

  /* Tasks */
  .task{display:flex;align-items:flex-start;gap:8px;padding:5px 6px;margin:0 -6px;border-radius:9px;cursor:grab}
  .task:hover{background:rgba(121,199,255,.25)}
  .grip{color:var(--sky);font-size:12px;line-height:18px;flex-shrink:0;letter-spacing:-1px;user-select:none}
  .check{width:17px;height:17px;margin-top:1.5px;flex-shrink:0;border-radius:6px;border:2px solid var(--sky);
    background:#fff;color:#fff;font-size:10px;line-height:13px;cursor:pointer;padding:0}
  .task.done .check{border-color:var(--navy);background:var(--navy)}
  .task-text{flex:1;font-size:13.5px;font-weight:500;line-height:1.45;color:var(--navy);word-break:break-word}
  .task.done .task-text{text-decoration:line-through;text-decoration-color:rgba(14,77,146,.55)}
  .del{border:none;background:none;color:var(--blue);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .15s}
  .task:hover .del{opacity:1}

  /* Add row */
  .add-row{display:flex;gap:4px;margin:8px 0 2px}
  .add-input{flex:1;min-width:0;font-size:13px;font-weight:500;font-family:var(--font);color:var(--navy);
    border:2px solid var(--sky);border-radius:11px;padding:6px 10px;background:#fff;outline:none;transition:border-color .15s}
  .add-input:focus{border-color:var(--blue)}
  .add-btn{border:none;border-radius:11px;background:var(--blue);color:#fff;width:31px;font-size:17px;
    font-weight:700;cursor:pointer;flex-shrink:0;box-shadow:0 2px 0 var(--navy)}

  /* Progress ring */
  .ring-pct{font:700 13px var(--font);fill:var(--navy)}
  @media (max-width:520px){ .title-pill{font-size:16px} }
</style>
</head>
<body>

<div class="band">
  <div class="band-inner">
    <div class="band-left">
      <svg id="ring" width="54" height="54" viewBox="0 0 54 54" aria-label="Weekly progress">
        <circle cx="27" cy="27" r="22.5" fill="#fff" stroke="var(--sky)" stroke-width="5"/>
        <circle id="ring-arc" cx="27" cy="27" r="22.5" fill="none" stroke="var(--blue)" stroke-width="5"
          stroke-linecap="round" transform="rotate(-90 27 27)" style="transition:stroke-dashoffset .5s ease"/>
        <text id="ring-text" class="ring-pct" x="50%" y="50%" dominant-baseline="central" text-anchor="middle">0%</text>
      </svg>
      <div>
        <div class="title-pill">Weekly Planner · 2026</div>
        <div class="week-line"><span id="week-label"></span><span class="status" id="status">Saved ✓</span></div>
      </div>
    </div>
    <div class="controls">
      <button class="nav-btn" id="prev" aria-label="Previous week">‹</button>
      <button class="nav-btn today" id="today-btn">Today</button>
      <button class="nav-btn" id="next" aria-label="Next week">›</button>
      <button class="nav-btn copy" id="copy-btn" title="Copy all of this week's tasks onto the same days next week">⧉ Copy → next week</button>
    </div>
  </div>
</div>

<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<script>
(function(){
  // ---------- Week math ----------
  const DAY=86400000;
  const mondayOf=d=>{const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());return new Date(x.getTime()-((x.getDay()+6)%7)*DAY);};
  const WEEKS=(()=>{const w=[];let m=mondayOf(new Date(2026,0,1));const end=new Date(2026,11,31);
    while(m<=end){const days=[];for(let i=0;i<7;i++)days.push(new Date(m.getTime()+i*DAY));w.push({monday:m,days});m=new Date(m.getTime()+7*DAY);}return w;})();
  const fmtKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DOW=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const weekLabel=w=>{const a=w.days[0],b=w.days[6];const s=a.getMonth()===b.getMonth();
    return `${MONTHS[a.getMonth()]} ${a.getDate()} – ${s?"":MONTHS[b.getMonth()]+" "}${b.getDate()}`;};
  const currentWeekIndex=()=>{const now=mondayOf(new Date()).getTime();
    const i=WEEKS.findIndex(w=>w.monday.getTime()===now);return i>=0?i:0;};
  const isToday=d=>fmtKey(d)===fmtKey(new Date());

  // ---------- localStorage persistence ----------
  const key=i=>`blue2026-week-${fmtKey(WEEKS[i].monday)}`;
  const load=i=>{try{return JSON.parse(localStorage.getItem(key(i))||"{}");}catch(e){return {};}};
  const save=(i,d)=>{try{localStorage.setItem(key(i),JSON.stringify(d));return true;}catch(e){return false;}};

  // ---------- State ----------
  let weekIdx=currentWeekIndex();
  let data=load(weekIdx);
  let flashTimer=null;

  const $=id=>document.getElementById(id);
  const grid=$("grid");
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

  function setStatus(msg){ $("status").textContent=msg; }
  function flash(msg){
    setStatus(msg);
    if(flashTimer)clearTimeout(flashTimer);
    flashTimer=setTimeout(()=>setStatus("Saved ✓"),2600);
  }
  function persist(){ flash(save(weekIdx,data)?"Saved ✓":"Couldn't save"); }

  // ---------- Render ----------
  function taskHTML(t,dayKey){
    return `<div class="task${t.done?" done":""}" draggable="true" data-day="${dayKey}" data-id="${t.id}" title="Drag to another day to move">
      <span class="grip" aria-hidden="true">⋮⋮</span>
      <button class="check" data-action="toggle" aria-label="${t.done?"Move back to planned":"Mark completed"}">${t.done?"✓":""}</button>
      <span class="task-text">${esc(t.text)}</span>
      <button class="del" data-action="delete" aria-label="Delete task">×</button>
    </div>`;
  }

  function render(){
    const week=WEEKS[weekIdx];
    $("week-label").textContent=`Week ${weekIdx+1} · ${weekLabel(week)}`;
    $("prev").disabled=weekIdx===0;
    $("next").disabled=weekIdx===WEEKS.length-1;
    $("copy-btn").disabled=weekIdx===WEEKS.length-1;

    grid.innerHTML=week.days.map(d=>{
      const k=fmtKey(d),tasks=data[k]||[];
      const planned=tasks.filter(t=>!t.done),completed=tasks.filter(t=>t.done);
      const today=isToday(d);
      return `<div class="card${today?" today":""}" data-day="${k}">
        <div class="card-head">
          <div class="head-left">
            <div class="date-chip${today?" today":""}">${d.getDate()}</div>
            <div><div class="dow">${DOW[(d.getDay()+6)%7]}</div>
            <div class="mo${today?" today":""}">${today?"Today":MONTHS[d.getMonth()]}</div></div>
          </div>
          ${tasks.length?`<span class="counter${completed.length===tasks.length?" alldone":""}">${completed.length}/${tasks.length}</span>`:""}
        </div>
        <div class="card-body">
          <div><span class="chip">Planned</span></div>
          ${planned.length?planned.map(t=>taskHTML(t,k)).join(""):`<div class="empty">No tasks yet</div>`}
          <div class="add-row">
            <input class="add-input" data-day="${k}" placeholder="Add a task" aria-label="Add task for ${MONTHS[d.getMonth()]} ${d.getDate()}">
            <button class="add-btn" data-action="add" data-day="${k}" aria-label="Add task">+</button>
          </div>
          ${completed.length?`<div class="divider"><span class="chip">Completed</span></div>${completed.map(t=>taskHTML(t,k)).join("")}`:""}
        </div>
      </div>`;
    }).join("");

    // Progress ring
    const all=week.days.flatMap(d=>data[fmtKey(d)]||[]);
    const pct=all.length?Math.round(all.filter(t=>t.done).length/all.length*100):0;
    const c=2*Math.PI*22.5;
    const arc=$("ring-arc");
    arc.setAttribute("stroke-dasharray",c);
    arc.setAttribute("stroke-dashoffset",c*(1-pct/100));
    $("ring-text").textContent=pct+"%";
  }

  // ---------- Mutations ----------
  function addTask(dayKey,text){
    (data[dayKey]=data[dayKey]||[]).push({id:Date.now()+Math.random(),text,done:false});
    persist();render();
    const input=grid.querySelector(`.add-input[data-day="${dayKey}"]`);
    if(input)input.focus();
  }
  function toggleTask(dayKey,id){
    data[dayKey]=(data[dayKey]||[]).map(t=>String(t.id)===String(id)?{...t,done:!t.done}:t);
    persist();render();
  }
  function deleteTask(dayKey,id){
    data[dayKey]=(data[dayKey]||[]).filter(t=>String(t.id)!==String(id));
    persist();render();
  }
  function moveTask(fromKey,toKey,id){
    const list=data[fromKey]||[];
    const task=list.find(t=>String(t.id)===String(id));
    if(!task)return;
    data[fromKey]=list.filter(t=>String(t.id)!==String(id));
    (data[toKey]=data[toKey]||[]).push(task);
    persist();render();
  }
  function copyToNextWeek(){
    if(weekIdx>=WEEKS.length-1)return;
    const nextIdx=weekIdx+1,next=load(nextIdx);
    let count=0;
    WEEKS[weekIdx].days.forEach((d,i)=>{
      const fromKey=fmtKey(d),toKey=fmtKey(WEEKS[nextIdx].days[i]);
      const copies=(data[fromKey]||[]).map(t=>({id:Date.now()+Math.random(),text:t.text,done:false}));
      if(copies.length){next[toKey]=[...(next[toKey]||[]),...copies];count+=copies.length;}
    });
    if(!count){flash("Nothing to copy this week");return;}
    flash(save(nextIdx,next)?`Copied ${count} task${count===1?"":"s"} to next week ✓`:"Copy failed — try again");
  }
  function gotoWeek(i){ weekIdx=i; data=load(weekIdx); render(); }

  // ---------- Events ----------
  $("prev").addEventListener("click",()=>gotoWeek(Math.max(0,weekIdx-1)));
  $("next").addEventListener("click",()=>gotoWeek(Math.min(WEEKS.length-1,weekIdx+1)));
  $("today-btn").addEventListener("click",()=>gotoWeek(currentWeekIndex()));
  $("copy-btn").addEventListener("click",copyToNextWeek);

  grid.addEventListener("click",e=>{
    const btn=e.target.closest("[data-action]");
    if(!btn)return;
    const action=btn.dataset.action;
    if(action==="add"){
      const dayKey=btn.dataset.day;
      const input=grid.querySelector(`.add-input[data-day="${dayKey}"]`);
      const v=input.value.trim();
      if(v)addTask(dayKey,v);
    }else{
      const row=btn.closest(".task");
      if(!row)return;
      if(action==="toggle")toggleTask(row.dataset.day,row.dataset.id);
      if(action==="delete")deleteTask(row.dataset.day,row.dataset.id);
    }
  });
  grid.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&e.target.classList.contains("add-input")){
      const v=e.target.value.trim();
      if(v)addTask(e.target.dataset.day,v);
    }
  });

  // Drag & drop
  grid.addEventListener("dragstart",e=>{
    const row=e.target.closest(".task");
    if(!row)return;
    e.dataTransfer.setData("text/plain",JSON.stringify({fromDay:row.dataset.day,id:row.dataset.id}));
    e.dataTransfer.effectAllowed="move";
  });
  grid.addEventListener("dragover",e=>{
    const card=e.target.closest(".card");
    if(!card)return;
    e.preventDefault();e.dataTransfer.dropEffect="move";
    card.classList.add("dragover");
  });
  grid.addEventListener("dragleave",e=>{
    const card=e.target.closest(".card");
    if(card&&!card.contains(e.relatedTarget))card.classList.remove("dragover");
  });
  grid.addEventListener("drop",e=>{
    const card=e.target.closest(".card");
    if(!card)return;
    e.preventDefault();card.classList.remove("dragover");
    try{
      const{fromDay,id}=JSON.parse(e.dataTransfer.getData("text/plain"));
      if(fromDay&&fromDay!==card.dataset.day)moveTask(fromDay,card.dataset.day,id);
    }catch(err){}
  });

  render();
})();
</script>
</body>
</html>
